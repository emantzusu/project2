<!DOCTYPE html>
<html>
<head>
<title>Basic javascript I/O page</title>

<script>
function add()  {
let a = document.getElementById("fn").value;
let b = document.getElementById("sn").value;
let c = Number(a) + Number(b);
document.getElementById("ans").innerHTML = c;
}
</script>

</head>
<body>

<h1>This is a one function calculator</h1>
<p>Please put in your first number: <input id="fn">  <br>
Please put in your second number: <input id="sn">   <br>
<button onclick="add()"> Add the Numbers </button>
</p>

<p>Your answer is: <span id="ans"> _____ </p>

</body>
</html>
